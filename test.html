<fieldset>
  <legend>Select a maintenance drone:</legend>

  <div>
    <input type="radio" id="huey" name="drone" value="huey" checked />
    <label for="huey">Huey</label>
  </div>

  <div>
    <input type="radio" id="dewey" name="drone" value="dewey" />
    <label for="dewey">Dewey</label>
  </div>

  <div>
    <input type="radio" id="louie" name="drone" value="louie" />
    <label for="louie">Louie</label>
  </div>
</fieldset>

<template id="quiz-question-template">
  <section class="quiz-question">
    <fieldset>
      <legend>Question text goes here</legend>

      <label>
        <input type="radio" name="answer" value="option1" /> Option 1
      </label>
      <label>
        <input type="radio" name="answer" value="option2" /> Option 2
      </label>
      <label>
        <input type="radio" name="answer" value="option3" /> Option 3
      </label>
    </fieldset>
  </section>
</template>

<div id="quiz-container"></div>

<script>
  const template = document.getElementById("quiz-question-template");
  const container = document.getElementById("quiz-container");

  // Clone the template
  const clone = template.content.cloneNode(true);

  // Customize the question text
  clone.querySelector("legend").textContent = "What is the capital of France?";
  clone.querySelectorAll("input")[0].value = "paris";
  clone.querySelectorAll("label")[0].textContent = "Paris";
  // ... update other options

  // Append to the quiz container
  container.appendChild(clone);
</script>
