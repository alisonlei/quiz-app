<!doctype html>
<html>
  <head>
    <title>Trivia Quiz</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/quiz.css" />

    <script type="module" src="main.js"></script>
  </head>
  <body>
    <header>
      <img src="./images/brain.png" alt="a brain icon" />
      <h1>My Trivia Quiz</h1>
    </header>
    <main>
      <fieldset id="multiple" class="hide">
        <legend></legend>

        <label> <input type="radio" name="mcOption" /></label>
        <label> <input type="radio" name="mcOption" /></label>
        <label> <input type="radio" name="mcOption" /></label>
        <label> <input type="radio" name="mcOption" /></label>
      </fieldset>
      <fieldset id="boolean" class="hide">
        <legend></legend>

        <label> <input type="radio" name="boolOption" />True</label>
        <label> <input type="radio" name="boolOption" />False</label>
      </fieldset>
      <p>Time left:<time></time></p>
      <div id="time-up-modal">
        <p>
          Time is up. You will be redirected to view your score and incorrect
          answers.
        </p>
      </div>
      <section id="questionSet"></section>
      <nav id="question-panel">
        <ul>
          <li><a></a></li>
        </ul>
      </nav>
      <div id="quiz-controls">
        <button id="submit">Submit quiz</button>
        <!-- <button id="back">Previous question</button> -->
        <button id="next">Next question</button>
        <button id="exit">Exit</button>
      </div>
    </main>

    <script></script>
  </body>
</html>
